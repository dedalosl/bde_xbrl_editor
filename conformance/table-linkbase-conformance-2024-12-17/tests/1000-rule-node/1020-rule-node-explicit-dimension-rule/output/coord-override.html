<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <STYLE type="text/css">table {font-family:Arial,sans-serif;vertical-align:middle;white-space:normal;}
            th {background:#eee;}
            td {} 
            .tableHdr{border-top:.5pt solid windowtext;border-right:none;border-bottom:none;border-left:.5pt solid windowtext;}
            .zAxisHdr{border-top:.5pt solid windowtext;border-right:.5pt solid windowtext;border-bottom:none;border-left:.5pt solid windowtext;}
            .xAxisSpanLeg,.yAxisSpanLeg,.yAxisSpanArm{border-top:none;border-right:none;border-bottom:none;border-left:.5pt solid windowtext;}
            .xAxisHdrValue{border-top:.5pt solid windowtext;border-right:none;border-bottom:none;border-left:1.0pt solid windowtext;}
            .xAxisHdr{border-top:.5pt solid windowtext;border-right:none;border-bottom:none;border-left:.5pt solid windowtext;} 
            .yAxisHdrWithLeg{vertical-align:middle;border-top:.5pt solid windowtext;border-right:none;border-bottom:none;border-left:.5pt solid windowtext;}
            .yAxisHdrWithChildrenFirst{border-top:none;border-right:none;border-bottom:.5pt solid windowtext;border-left:.5pt solid windowtext;}
            .yAxisHdrAbstract{border-top:.5pt solid windowtext;border-right:none;border-bottom:none;border-left:.5pt solid windowtext;}
            .yAxisHdrAbstractChildrenFirst{border-top:none;border-right:none;border-bottom:.5pt solid windowtext;border-left:.5pt solid windowtext;}
            .yAxisHdr{border-top:.5pt solid windowtext;border-right:none;border-bottom:none;border-left:.5pt solid windowtext;}
            .cell{border-top:1.0pt solid windowtext;border-right:.5pt solid windowtext;border-bottom:.5pt solid windowtext;border-left:.5pt solid windowtext;}
            .blockedCell{border-top:1.0pt solid windowtext;border-right:.5pt solid windowtext;border-bottom:.5pt solid windowtext;border-left:.5pt solid windowtext;background:#eee;}</STYLE>
    </head>
    <body>
        <table
          border="1"
          cellpadding="4"
          cellspacing="0"
          style="font-size:8pt;">
            <tr>
                <th
                  class="tableHdr"
                  colspan="2"
                  rowspan="3"
                  style="max-width:100em;">table4</th>
                <th
                  class="xAxisHdr"
                  colspan="3"
                  style="text-align:center;max-width:300pt;border-right:.5pt solid windowtext;">Label: D = d0</th>
            </tr>
            <tr>
                <th
                  class="xAxisSpanLeg"
                  rowspan="1"
                  style="border-right:.5pt solid windowtext;">&nbsp;</th>
                <th class="xAxisHdr" style="text-align:center;max-width:100pt;">Label: E = e1</th>
                <th
                  class="xAxisHdr"
                  style="text-align:center;max-width:100pt;border-right:.5pt solid windowtext;">Label: E = e2, D is overriden with D = d1</th>
            </tr>
            <tr>
                <th
                  class="xAxisHdr"
                  style="text-align:center;max-width:100pt;border-right:.5pt solid windowtext;">1</th>
                <th class="xAxisHdr" style="text-align:center;max-width:100pt;">2</th>
                <th
                  class="xAxisHdr"
                  style="text-align:center;max-width:100pt;border-right:.5pt solid windowtext;">3</th>
            </tr>
            <tr>
                <th
                  class="yAxisHdr"
                  colspan="1"
                  style="text-align:left;max-width:200em;">Label: m1</th>
                <th class="yAxisHdr" style="text-align:center;max-width:40pt;">1</th>
                <td class="cell" style="text-align:None;width:8em">101</td>
                <td class="cell" style="text-align:None;width:8em">201</td>
                <td class="cell" style="text-align:None;width:8em">401</td>
            </tr>
            <tr>
                <th
                  class="yAxisHdr"
                  colspan="1"
                  style="text-align:left;max-width:200em;border-bottom:.5pt solid windowtext;">Label: m2</th>
                <th
                  class="yAxisHdr"
                  style="text-align:center;max-width:40pt;border-bottom:.5pt solid windowtext;">2</th>
                <td class="cell" style="text-align:None;width:8em">102</td>
                <td class="cell" style="text-align:None;width:8em">202</td>
                <td class="cell" style="text-align:None;width:8em">402</td>
            </tr>
        </table>
    </body>
</html>
